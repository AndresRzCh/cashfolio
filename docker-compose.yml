services:
  backend:
    container_name: cashfolio-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file:
      - .env
    volumes:
      - ./data:/data
    networks:
      - cashfolio
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    container_name: cashfolio-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "7410:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cashfolio
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  cashfolio:
    driver: bridge
